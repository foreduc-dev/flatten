<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login • Flatten Attendance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  :root {
  --bg: #0d1117;
  --glass: rgba(255,255,255,0.12);
  --primary: #58a6ff;
  --accent: #58a6ff;
  --accent-dim: #1f6feb;
  --text: #c9d1d9;
  --text-muted: #8b949e;
  --text-dim: #6e7681;
  --border: #30363d;
  --radius: 12px;
  --bg-glass: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
}
  body {
    background: var(--bg);
    background-size: cover;
    /* No background image or gradient for cleaner glassmorphism effect */
    color: var(--text);
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    backdrop-filter: blur(12px);
    background: var(--bg-glass);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    width: 340px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    text-align: center;
    animation: popIn 0.6s ease forwards;
  }
  @keyframes popIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
  h1 { font-size: 1.6rem; margin-bottom: 1.5rem; color: var(--text); }
  input { width:100%; padding:0.75rem 1rem; margin-bottom:1rem; border:none; border-radius:0.5rem; background: rgba(255,255,255,0.12); color: var(--text); font-size:0.95rem; outline:none; }
  button { width:100%; padding:0.75rem 1rem; border:none; border-radius:0.5rem; background: var(--primary); color:#fff; font-weight:600; cursor:pointer; transition:background 0.3s, transform 0.1s; }
  button:hover { background: var(--accent-dim); transform:translateY(-2px); }
  .error { color:#ff6b6b; margin-top:0.5rem; font-size:0.85rem; }
</style>
</head>
<body>
  <div class="card">
    <h1>Sign In</h1>

    <form method="POST" action="/login">
      <input type="text" name="username" placeholder="Username" required />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit">Log In</button>
    </form>
    
  </div>
</body>
</html>
