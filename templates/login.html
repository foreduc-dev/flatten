<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Secure Portal Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --purple: #534AB7;
    --purple-dark: #3C3489;
    --teal: #1D9E75;
    --white-trans: rgba(255,255,255,0.15);
    --white: #ffffff;
    --green-trans: rgba(76, 175, 80, 0.2);
    --font: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin:0; padding:0; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #0d1117;
    font-family: var(--font);
    color: var(--white);
  }
  .card {
    display: flex;
    width: 800px;
    max-width: 90vw;
    min-height: 540px;
    border-radius: 16px;
    overflow: hidden;
    background: #111827;
  }
  .left {
    flex: 0 0 40%;
    background: var(--purple);
    color: var(--white);
    text-align: center;
    padding: 2rem 1rem;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .left .icon-circle {
    width: 100px;
    height: 100px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.5rem;
  }
  .left .icon-circle svg {
    width: 60px;
    height: 60px;
    fill: var(--white);
  }
  .left h2 {
    font-size: 1.8rem;
    margin-bottom: 0.5rem;
  }
  .left p {
    font-size: 1rem;
    opacity: 0.9;
    margin-bottom: 2rem;
  }
  .dots {
    position: absolute;
    bottom: 1rem;
    display: flex;
    gap: 0.5rem;
  }
  .dots span {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
  }
  .dots span.active { background: var(--white); }
  .right {
    flex: 1;
    background: var(--teal);
    padding: 2rem 2rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .field {
    margin-bottom: 1.5rem;
    position: relative;
  }
  .field label {
    display: flex;
    align-items: center;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.25rem;
    color: var(--white);
  }
  .field label svg {
    width: 14px;
    height: 14px;
    margin-right: 0.4rem;
    fill: var(--white);
  }
  .badge {
    background: rgba(255,255,255,0.2);
    color: var(--white);
    font-size: 0.65rem;
    padding: 2px 6px;
    border-radius: 8px;
    margin-left: 0.5rem;
    display: inline-flex;
    align-items: center;
  }
  .badge svg {
    width: 12px;
    height: 12px;
    margin-right: 2px;
    fill: var(--white);
  }
  .field input {
    width: 100%;
    padding: 0.75rem 2.5rem 0.75rem 2.5rem;
    background: var(--white-trans);
    border: 1px solid var(--white);
    border-radius: 10px;
    color: var(--white);
    font-size: 0.9rem;
    outline: none;
    position: relative;
  }
  .field input::placeholder {
    color: var(--white);
    opacity: 0.8;
  }
  .field input:focus {
    box-shadow: 0 0 0 2px var(--white);
  }
  .field .icon-left {
    position: absolute;
    left: 0.8rem;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
  }
  .field .toggle-eye {
    position: absolute;
    right: 0.8rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--white);
    padding: 0;
  }
  .error-msg {
    color: #ff6b6b;
    font-size: 0.75rem;
    margin-top: 0.25rem;
  }
  .btn-submit {
    width: 100%;
    padding: 0.85rem;
    background: var(--purple);
    color: var(--white);
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-submit:hover {
    background: var(--purple-dark);
  }
  .btn-submit:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .success-banner {
    margin-top: 1rem;
    padding: 0.75rem;
    background: var(--green-trans);
    color: var(--white);
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.9rem;
  }
  .success-banner svg {
    width: 16px;
    height: 16px;
    fill: var(--white);
  }
</style>
</head>
<body>
<div class="card">
  <div class="left">
    <div class="icon-circle">
      <!-- Shield lock icon -->
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9v4c0 3.31 2.69 6 6 6s6-2.69 6-6V9c0-3.87-3.13-7-7-7zm0 15c-1.66 0-3-1.34-3-3V9h6v5c0 1.66-1.34 3-3 3z"/></svg>
    </div>
    <h2>Secure Portal</h2>
    <p>Your credentials are protected and encrypted end to end.</p>
    <div class="dots">
      <span class="active"></span>
      <span></span>
      <span></span>
    </div>
  </div>
  <div class="right">
    <form id="loginForm" method="POST" novalidate>
      <div class="field">
        <label for="username">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/></svg>
          USERNAME
          <span class="badge"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 13l-1.41 1.41L12 13.83l-3.59 3.58L7 15l3.59-3.58L7 8l1.41-1.41L12 10.17l3.59-3.58L17 8l-3.59 3.58L17 15z"/></svg> masked</span>
        </label>
        <svg class="icon-left" viewBox="0 0 24 24"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/></svg>
        <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="off" />
        <button type="button" class="toggle-eye" data-target="username"><svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 13c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg></button>
        <div class="error-msg" id="err-username"></div>
      </div>
      <div class="field">
        <label for="password">
          <svg viewBox="0 0 24 24"><path d="M12 17a2 2 0 110-4 2 2 0 010 4zm6-7V9c0-3.31-2.69-6-6-6S6 5.69 6 9v1c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-8c0-1.1-.9-2-2-2zm-8-1c0-2.21 1.79-4 4-4s4 1.79 4 4v1H10V9z"/></svg>
          PASSWORD
          <span class="badge"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-3.31 0-6-2.69-6-6h2c0 2.21 1.79 4 4 4s4-1.79 4-4h2c0 3.31-2.69 6-6 6z"/></svg> masked</span>
        </label>
        <svg class="icon-left" viewBox="0 0 24 24"><path d="M12 17a2 2 0 110-4 2 2 0 010 4zm6-7V9c0-3.31-2.69-6-6-6S6 5.69 6 9v1c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-8c0-1.1-.9-2-2-2zm-8-1c0-2.21 1.79-4 4-4s4 1.79 4 4v1H10V9z"/></svg>
        <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="off" />
        <button type="button" class="toggle-eye" data-target="password"><svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 13c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg></button>
        <div class="error-msg" id="err-password"></div>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">Sign in →</button>
      <div class="success-banner" id="successBanner" style="display:none;">
        <svg viewBox="0 0 24 24"><path d="M9 16.17l-3.88-3.88L4 13.41l5 5 12-12-1.41-1.42z"/></svg>
        Credentials accepted — redirecting…
      </div>
    </form>
  </div>
</div>
<script>
// Toggle password visibility
document.querySelectorAll('.toggle-eye').forEach(btn => {
  btn.addEventListener('click', () => {
    const targetId = btn.getAttribute('data-target');
    const input = document.getElementById(targetId);
    input.type = input.type === 'password' ? 'text' : 'password';
  });
});

// Simple client‑side validation; allow normal form submission when valid
const form = document.getElementById('loginForm');
form.addEventListener('submit', e => {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  let valid = true;
  document.getElementById('err-username').textContent = '';
  document.getElementById('err-password').textContent = '';
  if (!username) {
    document.getElementById('err-username').textContent = 'Username required.';
    valid = false;
  }
  if (!password) {
    document.getElementById('err-password').textContent = 'Password required.';
    valid = false;
  }
  if (!valid) {
    e.preventDefault(); // stop submission
  }
});
</script>
</body>
</html>
