<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARMS Attendance Viewer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg-dark: #0d1117;
      --bg-light: #161b22;
      --bg: var(--bg-dark);
      --surface: #21262d;
      --surface2: #2c313a;
      --border: #30363d;
      --accent: #58a6ff;
      --accent-dim: #1f6feb;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --text-dim: #6e7681;
      --radius: 8px;
    }

  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0d1117, #161b22);
    /* background image removed */
    background-size: cover;
    background-blend-mode: overlay;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    animation: fadeIn 0.6s ease-out, gradientShift 12s ease infinite;
    overflow-x: hidden;
  }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

@keyframes gradientShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* HEADER */
    header {
      position: sticky;
      top: 0;
      border-bottom: 1px solid var(--border);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(22,27,34,0.9);
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    header .logo {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: white;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.2px;
    }

    header span {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
    }

    /* MAIN LAYOUT */
    main {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 24px;
    }

    /* CARD */
  .card {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 16px;
    }

    /* FORM */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
    }

    input, select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      padding: 9px 12px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus {
      border-color: var(--accent);
    }

    input::placeholder {
      color: var(--text-dim);
    }

    select option {
      background: var(--surface);
    }

    .hint {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* BUTTONS */
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 9px 18px;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover:not(:disabled) { opacity: 0.85; }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) { color: var(--text); border-color: var(--text-muted); }

    /* ALERT */
    .alert {
      border-radius: 6px;
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 16px;
      display: none;
    }

    .alert.error { background: rgba(248,81,73,0.12); border: 1px solid rgba(248,81,73,0.3); color: #f85149; }
    .alert.info  { background: rgba(47,129,247,0.1); border: 1px solid rgba(47,129,247,0.3); color: #79c0ff; }

    /* STATS ROW */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }

    .stat-box .num {
      font-size: 28px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-box .lbl {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-box.total .num  { color: var(--text); }
    .stat-box.present .num { color: var(--green); }
    .stat-box.absent .num  { color: var(--red); }
    .stat-box.od .num      { color: var(--yellow); }

    /* TABLE */
    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead tr {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    th {
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }

    tbody tr:last-child td { border-bottom: none; }

    tbody tr:hover { background: var(--surface2); }

    .badge {
      display: inline-block;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 10px;
      font-family: 'JetBrains Mono', monospace;
    }

    .badge.present { background: rgba(63,185,80,0.15); color: var(--green); }
    .badge.absent  { background: rgba(248,81,73,0.15);  color: var(--red); }
    .badge.od      { background: rgba(210,153,34,0.15); color: var(--yellow); }
    .badge.marked  { background: rgba(47,129,247,0.12); color: #79c0ff; }
    .badge.inactive{ background: var(--surface2); color: var(--text-dim); }

    /* TOGGLE SWITCH */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: var(--red);
      transition: .2s; border-radius: 24px;
    }
    .slider:before {
      position: absolute; content: "";
      height: 18px; width: 18px;
      left: 3px; bottom: 3px;
      background-color: white;
      transition: .2s; border-radius: 50%;
    }
    input:checked + .slider { background-color: var(--green); }
    input:checked + .slider:before { transform: translateX(20px); }
    input:disabled + .slider { opacity: 0.5; cursor: not-allowed; }

    /* LOADING */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }

    .empty svg { margin-bottom: 12px; opacity: 0.4; }
    .empty p { font-size: 13px; }

    #results { display: none; }

    /* COURSE SELECT ROW */
    .course-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      margin-top: 12px;
    }

    .course-row .form-group { flex: 1; }

    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      header span { display: none; }
    }
  </style>
</head>
<body>
  <div id="alertBox" class="alert" style="display:none;"></div>

<header>
  <div class="logo">A</div>
  <h1>ARMS Attendance Viewer</h1>
  <a href="/logout" class="btn-secondary" style="margin-left:auto;">Logout</a>
</header>
<div id="alertBox" class="alert" style="display:none;"></div>

<main>

  <!-- COURSE SELECT -->
  <div class="card" id="courseCard">
    <div class="card-title">Course</div>

      <div class="course-row">
          <div id="singleCourseGroup" style="display:flex; gap:10px; align-items: flex-end;">

            <div class="form-group">
              <label for="courseIdManual">Select Course</label>
              <select id="courseIdManual"></select>
            </div>
            <div class="form-group">
              <button class="btn-primary" onclick="fetchAttendance()" id="btnFetch">Fetch Attendance</button>
            </div>
          </div>
        <div class="form-group">
          <label>Posting Mode</label>
          <div style="display:flex; gap:8px; margin-top:6px;">
            <label><input type="radio" name="postMode" value="single" checked /> Single Course</label>
            <label><input type="radio" name="postMode" value="all" /> All Courses (CSV)</label>
          </div>
        </div>
        <!-- Removed CSV file upload; bulk processing will read slot_c.csv from server -->
        </div>
        <div class="form-group" style="display:flex; gap:8px; margin-top:6px;">
          <button class="btn-primary" onclick="handlePost()" id="btnPost">Process Attendance</button>
          <button class="btn-secondary" onclick="reset()">Clear Screen</button>
        </div>
      </div>
  </div>

  <!-- RESULTS -->
  <div id="results">
    <div class="stats-row">
      <div class="stat-box total">
        <div class="num" id="statTotal">0</div>
        <div class="lbl">Total</div>
      </div>
      <div class="stat-box present">
        <div class="num" id="statPresent">0</div>
        <div class="lbl">Present</div>
      </div>
      <div class="stat-box absent">
        <div class="num" id="statAbsent">0</div>
        <div class="lbl">Absent / Marked</div>
      </div>
      <div class="stat-box od">
        <div class="num" id="statOD">0</div>
        <div class="lbl">OD Approved</div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Reg No.</th>
            <th>Student Name</th>
            <th>Previous Status</th>
            <th>Mark Present</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    
    <div class="btn-row" style="margin-top: 16px; justify-content: flex-end;">
      <button class="btn-primary" onclick="submitAttendance()" id="btnSubmit">Post Attendance</button>
    </div>

    <div id="csvResults" style="display:none; margin-top:20px;">
      <h3>Slot C CSV Data</h3>
      <pre id="csvPre" style="background:#0d1117;color:#c9d1d9;padding:12px;border-radius:6px;overflow:auto;"></pre>
    </div>

  </div>

</main>

<script>
  function showAlert(msg, type = 'error') {
    const el = document.getElementById('alertBox');
    el.textContent = msg;
    el.className = `alert ${type}`;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 5000);
  }



  async function fetchAttendance() {
    const courseId = document.getElementById('courseIdManual').value.trim();

    if (!courseId) { showAlert('Please enter a Course ID.'); return; }

    const btn = document.getElementById('btnFetch');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Loading…';

    document.getElementById('results').style.display = 'none';

    try {
      const resp = await fetch('/api/attendance', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ course_id: courseId })
      });

      const data = await resp.json();

      if (!resp.ok) {
        showAlert(data.error || 'Failed to fetch attendance.');
        return;
      }

      renderTable(data.students || []);

    } catch (e) {
      showAlert('Network error: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Process Attendance';
    }
  }

  function renderTable(students) {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';

    let present = 0, absent = 0, od = 0;

    // We attach the students array to the window so submitAttendance can access their IDs
    window.currentStudents = students;

    students.forEach((s, i) => {
      let statusBadge, activeBadge;
      let isPresent = true;
      let disabledStr = '';

      if (!s.Isactive) {
        statusBadge = '<span class="badge inactive">Inactive</span>';
        isPresent = false;
        disabledStr = 'disabled';
      } else if (s.ODFlag) {
        statusBadge = '<span class="badge od">OD</span>';
        isPresent = true;
        od++;
        disabledStr = 'disabled'; // Probably can't override OD
      } else if (s.Isabsent === 'NA') {
        statusBadge = '<span class="badge present">Not Marked</span>';
        isPresent = true;
      } else if (s.Isabsent === 'ABS') {
        statusBadge = '<span class="badge absent">Absent</span>';
        isPresent = true; // User requested everyone default present
      } else {
        statusBadge = '<span class="badge marked">Present</span>';
        isPresent = true;
      }

      if (isPresent) present++; else absent++;

      let checkedStr = isPresent ? 'checked' : '';

      tbody.innerHTML += `
        <tr>
          <td style="color:var(--text-dim); font-family:'JetBrains Mono',monospace; font-size:11px;">${i + 1}</td>
          <td style="font-family:'JetBrains Mono',monospace; font-size:12px;">${s.RegId || '—'}</td>
          <td>${s.StudentName || '—'}</td>
          <td>${statusBadge}</td>
          <td>
            <label class="switch">
              <input type="checkbox" id="chk_${i}" ${checkedStr} ${disabledStr} onchange="updateStats()">
              <span class="slider"></span>
            </label>
          </td>
        </tr>`;
    });

    updateStats();
    document.getElementById('results').style.display = 'block';
  }

  function updateStats() {
    let present = 0, absent = 0, od = 0;
    const students = window.currentStudents || [];

    students.forEach((s, i) => {
        const chk = document.getElementById('chk_' + i);
        if (s.ODFlag) {
            od++;
        } else if (chk && chk.checked) {
            present++;
        } else {
            absent++;
        }
    });

    document.getElementById('statTotal').textContent = students.length;
    document.getElementById('statPresent').textContent = present;
    document.getElementById('statAbsent').textContent = absent;
    document.getElementById('statOD').textContent = od;
  }

  async function submitAttendance() {
    const courseId = document.getElementById('courseIdManual').value.trim();

    if (!courseId) { showAlert('Please enter a Course ID first.'); return; }

    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Posting…';

    const students = window.currentStudents || [];
    let absentIds = [];

    // Gather IDs of students who are UNCHECKED (Absent) and NOT inactive
    students.forEach((s, i) => {
        const chk = document.getElementById('chk_' + i);
        if (chk && !chk.checked && !s.ODFlag && s.Isactive) {
            absentIds.push(s.StudentId);
        }
    });

    const studentIdList = absentIds.join(',');

    try {
      const resp = await fetch('/api/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          course_id: courseId,
          student_id_list: studentIdList,
          type: "ABS"
        })
      });

      const data = await resp.json();

      if (!resp.ok) {
        showAlert(data.error || 'Failed to post attendance.');
      } else {
        showAlert(data.message || 'Attendance posted successfully!', 'info');
      }

    } catch (e) {
      showAlert('Network error: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Post Attendance';
    }
  }

   function handlePost() {
    const mode = document.querySelector('input[name="postMode"]:checked').value;
        if (mode === 'single') {
            const courseId = document.getElementById('courseIdManual').value.trim();
            if (!courseId) { showAlert('Please enter a Course ID first.'); return; }
            // 0️⃣ Show the CSV data before any posting
            fetch('/slot_c.csv')
                .then(r => r.ok ? r.text() : Promise.reject('Failed to load CSV'))
                .then(txt => {
                    const pre = document.getElementById('csvPre');
                    pre.textContent = txt;
                    document.getElementById('csvResults').style.display = 'block';
                })
                .catch(err => showAlert(err))
                .finally(() => {
                    // 1️⃣ Fetch the attendance for the entered course
                    fetchAttendance().then(() => {
                        // 2️⃣ Post the attendance for that course
                        submitAttendance();
                    });
                });
        } else if (mode === 'all') {
        // Fetch slot_c.csv from server and process each course ID
        fetch('/slot_c.csv')
            .then(resp => {
                if (!resp.ok) throw new Error('Failed to load slot_c.csv');
                return resp.text();
            })
            .then(text => {
                const rows = text.split(/\r?\n/).filter(l => l.trim());
                // Assume first column is Course ID, skip header if present (detect non-numeric header)
                const startIdx = isNaN(parseInt(rows[0].split(',')[0])) ? 1 : 0;
                const processAll = async () => {
                    for (let i = startIdx; i < rows.length; i++) {
                        const cols = rows[i].split(',');
                        const courseId = cols[0].trim();
                        if (!courseId) continue;
                        document.getElementById('courseIdManual').value = courseId;
                        await fetchAttendance();
                        await submitAttendance();
                    }
                };
                return processAll();
            })
            .then(() => {
                showAlert('All courses from slot_c.csv processed.', 'info');
            })
            .catch(err => {
                showAlert(err.message);
            });
    }
}

    // ------------------------------------------------------------
    // Load CSV on page start, show it, and fill the course dropdown
    // ------------------------------------------------------------
    function loadCourseCSV() {
        fetch('/slot_c.csv')
            .then(r => r.ok ? r.text() : Promise.reject('Failed to load CSV'))
            .then(txt => {
                // Show CSV preview
                const pre = document.getElementById('csvPre');
                pre.textContent = txt;
                document.getElementById('csvResults').style.display = 'block';

                // Populate the <select> with course IDs (first column)
                const select = document.getElementById('courseIdManual');
                select.innerHTML = '<option value="">-- Select a course --</option>';
                const rows = txt.split(/\r?\n/).filter(l => l.trim());
                rows.forEach(row => {
                    const cols = row.split(',');
                    const id = cols[0].trim();
                    if (id) {
                        const opt = document.createElement('option');
                        opt.value = id;
                        opt.textContent = id;
                        select.appendChild(opt);
                    }
                });
            })
            .catch(err => showAlert('Failed to load CSV: ' + err));
    }

    // Run when the DOM is ready
    document.addEventListener('DOMContentLoaded', loadCourseCSV);

// Show/hide CSV upload based on selected mode
document.querySelectorAll('input[name="postMode"]').forEach(r => {
    r.addEventListener('change', () => {
        const isAll = document.querySelector('input[name="postMode"]:checked').value === 'all';
        // Toggle visibility of single course input group
        document.getElementById('singleCourseGroup').style.display = isAll ? 'none' : 'flex';
    });
});

  function reset() {
    document.getElementById('courseIdManual').value = '';
    document.getElementById('results').style.display = 'none';
    document.getElementById('alertBox').style.display = 'none';
  }
</script>

</body>
</html>
